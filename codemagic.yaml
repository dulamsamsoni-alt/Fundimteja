workflows:
  android-apk:
    name: Fundi Mteja Firebase Build
    environment:
      flutter: 3.3.10
      java: 11
    scripts:
      - name: Delete bad android folder
        script: rm -rf android
      - name: Recreate android folder
        script: flutter create .
      - name: Force Gradle 7.2.0
        script: |
          sed -i "s/com.android.tools.build:gradle:.*/com.android.tools.build:gradle:7.2.0'/g" android/build.gradle
          sed -i "s/ext.kotlin_version = .*/ext.kotlin_version = '1.7.10'/g" android/build.gradle
      - name: Build APK
        script: flutter build apk --release --no-tree-shake-icons
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk