workflows:
  android-apk:
    name: Fundi Mteja Firebase Build
    environment:
      flutter: 3.7.12
      java: 17
    scripts:
      - name: Flutter Pub Get
        script: |
          flutter pub get
      - name: Build APK
        script: |
          flutter build apk --release --no-tree-shake-icons
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk