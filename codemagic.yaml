workflows:
  android-apk:
    name: Fundi Mteja Firebase Build
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Add Firebase
        script: |
          cp google-services.json android/app/
          flutter pub get
      - name: Build APK
        script: |
          flutter build apk --release --no-tree-shake-icons --android-skip-build-dependency-validation
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk