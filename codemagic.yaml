workflows:
  android-apk:
    name: Fundi Mteja APK
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Nuke Android & Recreate V2
        script: |
          rm -rf android
          flutter create .
          flutter pub get
      - name: Build APK
        script: |
          flutter build apk --release --no-tree-shake-icons
    artifacts:
      - build/app/outputs/**/*.apk
    publishing:
      email:
        recipients:
          - dulamsamsoni@gmail.com