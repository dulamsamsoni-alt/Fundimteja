workflows:
  android-apk:
    name: Fundi Mteja Firebase Build
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Nuke Android & Add Firebase
        script: |
          rm -rf android
          flutter create . --project-name fundi_mteja --org com.kidafutali
          mkdir -p android/app
          cp google-services.json android/app/
          flutter pub get
      - name: Build APK
        script: |
          flutter build apk --release --no-tree-shake-icons
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk